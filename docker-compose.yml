# OpenWorld Website — Docker Compose
#
# 启动方式：
#   docker compose up -d             # 启动网站
#   docker compose up -d --build     # 重新构建并启动（采集最新数据）
#
# 定时更新数据：
#   docker compose run --rm cron     # 手动触发采集+重建
#   配合 crontab 实现定时更新（见下方说明）

services:
  web:
    build: .
    ports:
      - "80:80"     # http
      - "443:443"   # https
    volumes:
      - /www/ssl:/etc/nginx/ssl:ro                         # 挂载 SSL 证书

  # 数据采集+重建（一次性任务）
  # 使用方式: docker compose run --rm cron
  cron:
    build:
      context: .
      target: build
    command: sh -c "node scripts/fetch-trending.mjs && npx astro build"
    volumes:
      - build-output:/app/dist
    profiles:
      - tools

volumes:
  build-output:

# ── 定时更新说明 ──
# 在服务器的 crontab 中添加:
#   0 5 * * * cd /path/to/website && docker compose up -d --build
# 每天凌晨 5:00 自动采集最新数据并重新部署
